<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Engine</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
            transition: background-color 0.3s, color 0.3s;
        }

        .search-section {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            transition: background-color 0.3s, color 0.3s;
        }

        .search-section img {
            width: 100px;
            display: block;
            margin: 0 auto 20px;
        }

        .search-section button {
            padding: 10px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .search-section button:hover {
            background-color: #45a049;
        }

        .search-section form {
            margin-top: 20px;
            text-align: center;
        }

        .search-section label {
            margin-right: 10px;
        }

        .search-section input[type="text"],
        .search-section input[type="submit"],
        .search-section input[type="checkbox"] {
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .search-section input[type="submit"] {
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .search-section input[type="submit"]:hover {
            background-color: #45a049;
        }

        .search-section a {
            display: block;
            margin-top: 10px;
            color: #007BFF;
            text-decoration: none;
            transition: color 0.3s;
        }

        .search-section a:hover {
            color: #0056b3;
        }

        .search-result {
            border: 1px solid #dfe1e5;
            border-radius: 8px;
            margin-bottom: 20px;
            padding: 20px;
        }

        .search-results {
            margin-top: 20px;
        }

        .search-results p {
            margin-bottom: 10px;
        }

        .dark-mode {
            background-color: #333;
            color: #fff;
        }

        .dark-mode .search-section {
            background-color: #444;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .dark-mode .search-section button,
        .dark-mode .search-section input[type="submit"] {
            background-color: #1E88E5;
        }

        .dark-mode .search-section button:hover,
        .dark-mode .search-section input[type="submit"]:hover {
            background-color: #1565C0;
        }

        .dark-mode .search-section a {
            color: #80D8FF;
        }

        .dark-mode .search-section a:hover {
            color: #64B5F6;
        }

        .tagline {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            color: #777;
        }

        .search-stats {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #777;
        }
    </style>
</head>
<body>
<div class="search-section">
    <div class="tagline">I love Java and Search Engine!!!!.</div>

    <img src="logo.png" alt="Logo">
    <button onclick="toggleMode()">Change Mode</button>

    <form method="get" action="/index.html">
        <label for="query">Search:</label>
        <input type="text" id="query" name="query" value="">
        <input type="submit" value="Search">
        <input type="checkbox" id="wildcard" name="wildcard" value="wildcard">
        <label for="wildcard">Wildcard Search</label><br>
    </form>

    <div>
        <a href="/index.html?action=viewHistory">View Search History</a>
        <a href="/index.html?action=viewVisited">View Visited Results</a>
        <a href="/index.html?action=viewFavorites">View Favorite Results</a>
    </div>

    <div class="search-stats" id="searchStats">
        Total Results: <span id="totalResults"><!-- Total Results --></span> |
        Time Taken: <span id="timeTaken"><!-- Time Taken -->ms</span>
    </div>

    <!-- search-results -->

    <div class="search-results">
        <p>Last Visited: <!-- Last Visited --></p>
    </div>
</div>

<script>
    function toggleMode() {
        document.body.classList.toggle('dark-mode');
        const isDarkMode = document.body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDarkMode);
    }

    document.addEventListener('DOMContentLoaded', function() {
        const isDarkMode = localStorage.getItem('darkMode') === 'true';
        if (isDarkMode) {
            document.body.classList.add('dark-mode');
        }
    });
</script>
</body>
</html>
